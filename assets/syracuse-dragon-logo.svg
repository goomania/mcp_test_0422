<svg width="760" height="260" viewBox="0 0 760 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Syracuse-inspired dragon logo</title>
  <desc id="desc">An orange collegiate style emblem with an abstract S and a dragon silhouette sweeping over it.</desc>

  <defs>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9A2E"/>
      <stop offset="100%" stop-color="#D45300"/>
    </linearGradient>
    <linearGradient id="dragonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#222831"/>
      <stop offset="100%" stop-color="#0F141A"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Emblem plate -->
  <rect x="24" y="24" width="330" height="212" rx="28" fill="url(#orangeGrad)" filter="url(#softShadow)"/>

  <!-- Abstract block S (inspired, not official reproduction) -->
  <path d="M90 78C104 57 132 46 172 46H286V86H182C161 86 146 91 139 101C132 111 135 121 149 126L246 158C289 172 303 209 277 232C261 246 234 252 199 252H80V212H192C212 212 226 208 233 200C240 192 237 184 223 179L128 149C84 135 68 105 90 78Z" fill="white" fill-opacity="0.95"/>

  <!-- Dragon silhouette sweeping over emblem -->
  <path d="M346 141C392 110 452 92 528 89C515 78 507 66 504 54C527 61 546 75 561 95C609 102 653 121 694 153C673 153 654 156 637 161C661 174 680 190 694 211C659 202 625 185 594 160C548 168 503 173 458 176C415 178 377 174 344 164L346 141Z" fill="url(#dragonGrad)"/>
  <path d="M503 95C487 97 472 102 459 109C464 94 475 82 492 73C486 66 482 58 480 49C499 54 514 65 526 80" stroke="#F57C00" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="538" cy="101" r="5" fill="#F57C00"/>

  <!-- Wordmark -->
  <text x="374" y="214" font-size="44" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-weight="800" fill="#1C1C1C" letter-spacing="1.5">DRAGON PRIDE</text>
</svg>
